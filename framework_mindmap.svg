<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Mind Map Styles with improved aesthetics -->
  <defs>
    <!-- Gradients for nodes -->
    <linearGradient id="gradient-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4568dc" />
      <stop offset="100%" stop-color="#b06ab3" />
    </linearGradient>
    
    <linearGradient id="gradient-level1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2193b0" />
      <stop offset="100%" stop-color="#6dd5ed" />
    </linearGradient>
    
    <linearGradient id="gradient-level2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11998e" />
      <stop offset="100%" stop-color="#38ef7d" />
    </linearGradient>
    
    <linearGradient id="gradient-level3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f46b45" />
      <stop offset="100%" stop-color="#eea849" />
    </linearGradient>
    
    <!-- Drop shadow for nodes -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Improved CSS styles -->
    <style type="text/css">
      .node {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        fill: white;
        text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.2);
      }
      .main-node {
        font-weight: 600;
        font-size: 20px;
        letter-spacing: 0.5px;
      }
      .section-node {
        font-weight: 500;
        font-size: 16px;
      }
      .connector {
        stroke-width: 2px;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#drop-shadow);
      }
      .level-1 {
        stroke: url(#gradient-main);
      }
      .level-2 {
        stroke: url(#gradient-level1);
      }
      .level-3 {
        stroke: url(#gradient-level2);
      }
      .level-4 {
        stroke: url(#gradient-level3);
      }
      .node-bg {
        stroke-width: 1.5px;
        rx: 12;
        ry: 12;
        filter: url(#drop-shadow);
      }
      .node-bg.level-1 {
        fill: url(#gradient-main);
        stroke: #4568dc;
      }
      .node-bg.level-2 {
        fill: url(#gradient-level1);
        stroke: #2193b0;
      }
      .node-bg.level-3 {
        fill: url(#gradient-level2);
        stroke: #11998e;
      }
      .node-bg.level-4 {
        fill: url(#gradient-level3);
        stroke: #f46b45;
      }
    </style>
  </defs>

  <!-- Background with subtle pattern -->
  <rect width="100%" height="100%" fill="#f9f9f9" />
  <pattern id="subtle-pattern" width="50" height="50" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="50" height="50" fill="#f9f9f9" />
    <line x1="0" y1="0" x2="50" y2="0" stroke="#f0f0f0" stroke-width="1" />
  </pattern>
  <rect width="100%" height="100%" fill="url(#subtle-pattern)" opacity="0.5" />
  
  <!-- Main Node with improved styling -->
  <g transform="translate(600, 80)">
    <rect class="node-bg level-1" x="-140" y="-30" width="280" height="60" />
    <text class="node main-node" text-anchor="middle" dominant-baseline="middle">NCTS Automation Framework</text>
  </g>

  <!-- Level 1 Nodes with curved connectors -->
  <!-- Project Structure -->
  <g transform="translate(250, 200)">
    <rect class="node-bg level-2" x="-110" y="-25" width="220" height="50" />
    <text class="node section-node" text-anchor="middle" dominant-baseline="middle">Project Structure</text>
    <!-- Curved Connector -->
    <path class="connector level-1" d="M 0,-25 C 0,-70 175,-70 350,-120" stroke-dasharray="0" />
  </g>

  <!-- Key Components -->
  <g transform="translate(600, 200)">
    <rect class="node-bg level-2" x="-110" y="-25" width="220" height="50" />
